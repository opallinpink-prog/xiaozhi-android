name: Build Android APK
on: [push, pull_request]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # 🔥 Full clean: remove all build outputs and disable build cache
      - name: Clean project (no cache)
        run: ./gradlew clean --no-build-cache

      # Optional: Delete Gradle's local build cache directory (if you want a truly fresh start)
      - name: Delete Gradle build cache (optional)
        run: rm -rf ~/.gradle/caches/build-cache-*

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: XiaoZhi-Custom-APK
          path: app/build/outputs/apk/debug/app-debug.apk
